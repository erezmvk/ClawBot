# OpenClaw Backup Configuration
# Users can override via RESTIC_BACKUP_CONFIG_FILE env var

# Restic repository location (S3-compatible)
# Environment variables are expanded at runtime
repository: "s3:${RESTIC_SPACES_ENDPOINT}/${RESTIC_SPACES_BUCKET}/${RESTIC_HOST}/restic"
# Backup paths with per-path exclusions
# Order matters for restore: /etc is restored first after packages
paths:
  - path: /etc
    exclude:
      - "cont-init.d"
      - "services.d"
      - "s6-overlay"
      - "digitalocean"
      - "openclaw"

  - path: /root
    exclude:
      - "*.lock"
      - "*.pid"
      - "*.sock"
  - path: /data/.openclaw
    exclude:
      - "*.lock"
      - "*.pid"
      - "*.sock"

  - path: /data/tailscale

  # /home is intentionally NOT backed up.
  # All openclaw memory, MEMORY.md, USER.md, session transcripts, and conversation
  # history live in /data/.openclaw (backed up above). The /home directory only
  # contains the openclaw binary + node_modules baked into the Docker image, and
  # files regenerated on every startup by cont-init scripts.
  # Backing up /home caused snapshots to grow to 2-4 GiB and OOM-killed the
  # container during restore on every startup (exit code 137).
  # Reference: https://docs.openclaw.ai/install/docker (only ~/.openclaw + workspace
  # need to persist across container recreation).

# Global settings
backup_interval_seconds: 30 # 30 seconds
prune_interval_seconds: 3600 # 1 hour

# Retention policy (for restic forget)
retention:
  keep_last: 10
  keep_hourly: 48
  keep_daily: 30
  keep_weekly: 8
  keep_monthly: 6
